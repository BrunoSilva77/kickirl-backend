<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KickIRL — Streamers ao Vivo no Mapa</title>
<meta name="description" content="Veja streamers IRL da Kick.com no mapa em tempo real. GPS ao vivo, sem login, sem cadastro.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🟢</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --kick: #53FC18;
  --kick-glow: rgba(83,252,24,0.25);
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #181818;
  --surface3: #222;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.10);
  --text: #f0f0f0;
  --text2: #999;
  --text3: #555;
  --red: #ef4444;
  --font: 'Inter', -apple-system, sans-serif;
  --font-display: 'Space Grotesk', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* ═══ TOPBAR ═══ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 48px; display: flex; align-items: center; gap: 10px;
  padding: 0 16px;
  background: rgba(10,10,10,0.75);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 7px; cursor: pointer; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--kick); box-shadow: 0 0 10px var(--kick-glow); animation: dot-pulse 2.5s ease-in-out infinite; }
@keyframes dot-pulse { 0%,100%{box-shadow:0 0 6px var(--kick-glow)} 50%{box-shadow:0 0 18px var(--kick), 0 0 36px var(--kick-glow)} }
.logo-text { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; color: #fff; }
.logo-text em { color: var(--kick); font-style: normal; }
.topbar-spacer { flex: 1; }
.topbar-stat {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.72rem; color: var(--text2);
  padding: 4px 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 100px;
}
.topbar-stat .count { color: var(--kick); font-weight: 700; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: blink 1.4s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; transition: 0.3s; }
.conn-dot.ok { background: var(--kick); }
.conn-dot.off { background: var(--text3); }
.conn-dot.err { background: var(--red); }

.btn-download-app {
  background: rgba(255,255,255,0.08); color: var(--text);
  border: 1px solid var(--border); border-radius: 100px;
  padding: 5px 12px; font-size: 0.75rem; font-weight: 600;
  text-decoration: none; display: flex; align-items: center; gap: 6px;
  transition: 0.2s;
}
.btn-download-app:hover { background: var(--kick); color: #000; border-color: var(--kick); }

/* ═══ MAP ═══ */
#map { position: fixed; inset: 0; top: 48px; z-index: 1; }
/* Dark mode filter for Google Maps tiles */
.leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%) saturate(1.2); }
.leaflet-container { background: #111 !important; }
.leaflet-control-zoom { border: none !important; border-radius: 8px !important; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important; }
.leaflet-control-zoom a { background: var(--surface2) !important; color: var(--text) !important; border-color: var(--border) !important; width: 32px !important; height: 32px !important; line-height: 32px !important; }
.leaflet-control-attribution { display: none !important; }

/* ═══ STREAMER MARKER ═══ */
.marker-pin {
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; transition: transform 0.2s;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.5));
}
.marker-pin:hover { transform: scale(1.1); }
.marker-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.8rem; color: #000;
  border: 3px solid #fff;
  position: relative;
}
.marker-avatar::after {
  content: ''; position: absolute; inset: -4px;
  border-radius: 50%; border: 2px solid currentColor; opacity: 0.3;
}
.marker-name {
  margin-top: 4px; padding: 2px 8px;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
  border-radius: 4px; font-size: 0.65rem; font-weight: 600;
  white-space: nowrap; color: #fff;
  border: 1px solid rgba(255,255,255,0.1);
}
.marker-live {
  position: absolute; top: -3px; right: -3px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--red); border: 2px solid #fff;
  animation: blink 1.4s ease-in-out infinite;
}
.marker-pulse {
  position: absolute; inset: -8px; border-radius: 50%;
  border: 2px solid; opacity: 0;
  animation: marker-ring 2s ease-out infinite;
}
@keyframes marker-ring {
  0% { transform: scale(0.8); opacity: 0.6; }
  100% { transform: scale(1.6); opacity: 0; }
}

/* ═══ PANEL (SLIDE-IN) ═══ */
.panel-overlay {
  position: fixed; inset: 0; top: 48px; z-index: 100;
  background: rgba(0,0,0,0.3); opacity: 0;
  pointer-events: none; transition: opacity 0.25s;
}
.panel-overlay.open { opacity: 1; pointer-events: auto; }

.panel {
  position: fixed; top: 48px; right: 0; bottom: 0; z-index: 150;
  width: 380px; max-width: 92vw;
  background: rgba(14,14,14,0.95);
  backdrop-filter: blur(24px);
  border-left: 1px solid var(--border2);
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.panel.open { transform: translateX(0); }

.panel-header {
  padding: 16px 18px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.panel-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.95rem; color: #000;
  border: 2px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.panel-info { flex: 1; min-width: 0; }
.panel-name {
  font-size: 1rem; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.panel-category { font-size: 0.76rem; color: var(--text2); margin-top: 2px; }
.panel-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  color: var(--text2); font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: 0.15s;
}
.panel-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

.badge-live {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--red); color: #fff; border-radius: 4px;
  padding: 2px 7px; font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.badge-live .d { width: 5px; height: 5px; border-radius: 50%; background: #fff; animation: blink 1.4s ease-in-out infinite; }

.panel-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.stat-box {
  background: rgba(255,255,255,0.02); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px;
}
.stat-label { font-size: 0.65rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.stat-value { font-size: 0.95rem; font-weight: 600; font-variant-numeric: tabular-nums; }

.panel-section {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.panel-section-title {
  font-size: 0.68rem; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
}

.panel-map {
  width: 100%; height: 180px; border-radius: 10px;
  border: 1px solid var(--border); overflow: hidden;
}

.panel-coords {
  margin-top: 8px; padding: 8px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; font-family: monospace; font-size: 0.78rem;
  color: var(--kick);
}

.panel-trail-info {
  font-size: 0.76rem; color: var(--text2); line-height: 1.6;
}

.panel-actions {
  padding: 14px 18px; margin-top: auto;
}
.btn-kick {
  width: 100%; padding: 12px; border-radius: 8px; border: none;
  background: var(--kick); color: #000; font-weight: 700;
  font-size: 0.88rem; font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: 0.15s; cursor: pointer;
}
.btn-kick:hover { background: #6aff3a; transform: translateY(-1px); }

/* ═══ EMPTY STATE ═══ */
.empty-state {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 50; text-align: center; pointer-events: none;
  opacity: 0; transition: opacity 0.5s;
}
.empty-state.show { opacity: 1; }
.empty-card {
  background: rgba(14,14,14,0.9); backdrop-filter: blur(16px);
  border: 1px solid var(--border2); border-radius: 18px;
  padding: 2rem 2.5rem; max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
.empty-desc { font-size: 0.85rem; color: var(--text2); line-height: 1.6; }

/* ═══ TOAST ═══ */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
  z-index: 999; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 10px 18px; font-size: 0.82rem;
  display: flex; align-items: center; gap: 8px;
  opacity: 0; transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

@media (max-width: 600px) {
  .panel { width: 100%; max-width: 100%; border-left: none; border-top: 1px solid var(--border2); top: auto; bottom: 0; height: 70vh; transform: translateY(100%); border-radius: 18px 18px 0 0; }
  .panel.open { transform: translateY(0); }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">Kick<em>IRL</em></span>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-stat">
    <span class="conn-dot off" id="conn-dot"></span>
    <span id="conn-text">Conectando…</span>
  </div>
  <div class="topbar-stat" id="live-stat" style="display:none">
    <span class="live-dot"></span>
    <span><span class="count" id="live-count">0</span> ao vivo</span>
  </div>
  <div class="topbar-stat" id="viewer-stat" style="display:none">
    👁 <span class="count" id="viewer-count">0</span>
  </div>
  <button class="btn-download-app" onclick="promptDownload()" title="Baixar App para Android">
    📱 Baixar App
  </button>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- EMPTY STATE -->
<div class="empty-state show" id="empty-state">
  <div class="empty-card">
    <div class="empty-icon">📡</div>
    <div class="empty-title">Nenhum streamer ao vivo</div>
    <div class="empty-desc">Quando um streamer da Kick iniciar o rastreamento, o marcador aparecerá aqui automaticamente.</div>
  </div>
</div>

<!-- PANEL -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-avatar" id="p-avatar">—</div>
    <div class="panel-info">
      <div class="panel-name">
        <span id="p-name">—</span>
        <span class="badge-live" id="p-badge"><span class="d"></span> LIVE</span>
      </div>
      <div class="panel-category" id="p-category">—</div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>

  <div class="panel-stats">
    <div class="stat-box">
      <div class="stat-label">Viewers</div>
      <div class="stat-value" id="p-viewers">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Precisão GPS</div>
      <div class="stat-value" id="p-accuracy">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Velocidade</div>
      <div class="stat-value" id="p-speed">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Atualizado</div>
      <div class="stat-value" id="p-updated">—</div>
    </div>
  </div>

  <div class="panel-section">
    <div class="panel-section-title">Mini-mapa</div>
    <div class="panel-map" id="panel-minimap"></div>
    <div class="panel-coords" id="p-coords">Aguardando…</div>
  </div>

  <div class="panel-section">
    <div class="panel-section-title">Trilha</div>
    <div class="panel-trail-info" id="p-trail-info">—</div>
  </div>

  <div class="panel-actions">
    <button class="btn-kick" id="p-kick-btn" onclick="openKick()">
      🎬 Assistir na Kick
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span id="toast-text"></span></div>

<script>
// ═══════════ CONFIG ═══════════
const HOST = window.location.host;
const WS_PROTO = location.protocol === 'https:' ? 'wss' : 'ws';
const API = `${location.protocol}//${HOST}`;
const WS_URL = `${WS_PROTO}://${HOST}/live/all`;

// ═══════════ STATE ═══════════
const streamers = new Map(); // username → data
const markers = new Map();   // username → { marker, trail }
let map = null;
let ws = null;
let selectedUser = null;
let panelMap = null;
let panelMarker = null;
let panelTrail = null;
let reconnectTimer = null;
let updateInterval = null;

const COLORS = ['#53FC18','#38bdf8','#f59e0b','#ef4444','#a78bfa','#ec4899','#14b8a6','#f97316','#06b6d4','#84cc16'];
let colorIndex = 0;
const userColors = new Map();

function getColor(username) {
  if (!userColors.has(username)) {
    userColors.set(username, COLORS[colorIndex % COLORS.length]);
    colorIndex++;
  }
  return userColors.get(username);
}

// ═══════════ MAP INIT ═══════════
map = L.map('map', { 
  zoomControl: false, 
  minZoom: 3,
  maxBounds: [[-90, -10000], [90, 10000]],
  maxBoundsViscosity: 1.0 
}).setView([0, 0], 3);
L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
  subdomains: ['mt0', 'mt1', 'mt2', 'mt3'], maxZoom: 20
}).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

// ═══════════ MARKER MANAGEMENT ═══════════
function createOrUpdateMarker(s) {
  const c = getColor(s.username);
  const initials = (s.displayName || s.username).slice(0, 2).toUpperCase();

  if (!s.location) return;

  const existing = markers.get(s.username);

  if (existing) {
    // Update position
    existing.marker.setLatLng([s.location.lat, s.location.lon]);

    // Update trail
    if (s.trail && s.trail.length > 1) {
      if (existing.trailLine) map.removeLayer(existing.trailLine);
      const pts = s.trail.map(p => Array.isArray(p) ? p : [p.lat || p[0], p.lon || p[1]]);
      existing.trailLine = L.polyline(pts, { color: c, weight: 3, opacity: 0.5, smoothFactor: 1.5 }).addTo(map);
    }
  } else {
    // Create new marker
    const icon = L.divIcon({
      className: '',
      html: `
        <div class="marker-pin" onclick="event.stopPropagation(); selectStreamer('${s.username}')">
          <div class="marker-avatar" style="background:${c}; color:#000">
            ${initials}
            <div class="marker-live"></div>
            <div class="marker-pulse" style="border-color:${c}"></div>
          </div>
          <div class="marker-name">${s.displayName || s.username}</div>
        </div>
      `,
      iconSize: [60, 65],
      iconAnchor: [30, 32],
    });

    const marker = L.marker([s.location.lat, s.location.lon], { icon, interactive: true }).addTo(map);
    marker.on('click', () => selectStreamer(s.username));

    let trailLine = null;
    if (s.trail && s.trail.length > 1) {
      const pts = s.trail.map(p => Array.isArray(p) ? p : [p.lat || p[0], p.lon || p[1]]);
      trailLine = L.polyline(pts, { color: c, weight: 3, opacity: 0.5, smoothFactor: 1.5 }).addTo(map);
    }

    markers.set(s.username, { marker, trailLine });
  }
}

function removeMarker(username) {
  const existing = markers.get(username);
  if (existing) {
    map.removeLayer(existing.marker);
    if (existing.trailLine) map.removeLayer(existing.trailLine);
    markers.delete(username);
  }
}

function fitAllMarkers() {
  const allMarkers = [...markers.values()];
  if (allMarkers.length === 0) return;
  if (allMarkers.length === 1) {
    const pos = allMarkers[0].marker.getLatLng();
    map.flyTo(pos, 13, { duration: 1.2 });
    return;
  }
  const group = L.featureGroup(allMarkers.map(m => m.marker));
  map.flyToBounds(group.getBounds().pad(0.2), { duration: 1.2, maxZoom: 14 });
}

// ═══════════ UI UPDATES ═══════════
function updateTopbar() {
  const liveCount = [...streamers.values()].filter(s => s.isLive).length;
  const liveStat = document.getElementById('live-stat');
  document.getElementById('live-count').textContent = liveCount;
  liveStat.style.display = liveCount > 0 ? 'flex' : 'none';

  const empty = document.getElementById('empty-state');
  if (liveCount > 0) empty.classList.remove('show');
  else empty.classList.add('show');
}

function updateSelectedPanel() {
  if (!selectedUser) return;
  const s = streamers.get(selectedUser);
  if (!s) return;

  document.getElementById('p-viewers').textContent = (s.viewerCount || 0).toLocaleString();
  if (s.location) {
    document.getElementById('p-accuracy').textContent = s.location.accuracy ? `${Math.round(s.location.accuracy)}m` : '—';
    document.getElementById('p-speed').textContent = s.location.speed ? `${(s.location.speed * 3.6).toFixed(1)} km/h` : '—';
    const ago = Math.round((Date.now() - s.location.updatedAt) / 1000);
    document.getElementById('p-updated').textContent = ago < 5 ? 'agora' : ago < 60 ? `${ago}s` : `${Math.floor(ago / 60)}min`;
    document.getElementById('p-coords').textContent = `${s.location.lat.toFixed(6)}, ${s.location.lon.toFixed(6)}`;

    // Update panel minimap
    if (panelMap) {
      panelMap.setView([s.location.lat, s.location.lon], 15);
      if (panelMarker) panelMarker.setLatLng([s.location.lat, s.location.lon]);
    }
  }

  document.getElementById('p-trail-info').textContent = s.trail
    ? `${s.trail.length} pontos registrados no percurso`
    : 'Nenhum dado de trilha';
}

// ═══════════ PANEL ═══════════
function selectStreamer(username) {
  const s = streamers.get(username);
  if (!s || !s.location) return;

  selectedUser = username;
  const c = getColor(username);
  const initials = (s.displayName || s.username).slice(0, 2).toUpperCase();

  // Header
  const av = document.getElementById('p-avatar');
  av.textContent = initials;
  av.style.background = `linear-gradient(135deg, ${c}, ${c}88)`;
  document.getElementById('p-name').textContent = s.displayName || s.username;
  document.getElementById('p-category').textContent = s.category || 'IRL';
  document.getElementById('p-badge').style.display = s.isLive ? 'inline-flex' : 'none';

  updateSelectedPanel();

  // Open panel
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');

  // Fly to streamer on main map
  map.flyTo([s.location.lat, s.location.lon], 15, { duration: 1 });

  // Init panel minimap
    setTimeout(() => {
    if (!panelMap) {
      panelMap = L.map('panel-minimap', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false }).setView([s.location.lat, s.location.lon], 15);
      L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { subdomains: ['mt0', 'mt1', 'mt2', 'mt3'], maxZoom: 20 }).addTo(panelMap);
    } else {
      panelMap.setView([s.location.lat, s.location.lon], 15);
    }

    if (panelMarker) panelMap.removeLayer(panelMarker);
    if (panelTrail) panelMap.removeLayer(panelTrail);

    const icon = L.divIcon({
      className: '',
      html: `<div style="width:28px;height:28px;border-radius:50%;background:${c};border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.65rem;color:#000;box-shadow:0 2px 8px rgba(0,0,0,0.4)">${initials}</div>`,
      iconSize: [28, 28], iconAnchor: [14, 14],
    });
    panelMarker = L.marker([s.location.lat, s.location.lon], { icon }).addTo(panelMap);

    if (s.trail && s.trail.length > 1) {
      const pts = s.trail.map(p => Array.isArray(p) ? p : [p.lat || p[0], p.lon || p[1]]);
      panelTrail = L.polyline(pts, { color: c, weight: 2, opacity: 0.6 }).addTo(panelMap);
    }

    panelMap.invalidateSize();
  }, 100);
}

function closePanel() {
  selectedUser = null;
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
}

function openKick() {
  if (selectedUser) {
    window.open(`https://kick.com/${selectedUser}`, '_blank');
  }
}

async function promptDownload() {
  const pwd = prompt("Digite a senha de streamer para acessar o App:");
  if (!pwd) return;

  try {
    const res = await fetch(`${API}/api/get-apk`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });

    if (res.ok) {
      const data = await res.json();
      window.location.href = data.url; // Inicia o download na hora
    } else {
      alert("❌ Senha incorreta!");
    }
  } catch (err) {
    alert("Erro de conexão ao verificar a senha.");
  }
}

// ═══════════ WEBSOCKET ═══════════
function connect() {
  if (ws && ws.readyState <= 1) return;

  ws = new WebSocket(WS_URL);
  const connDot = document.getElementById('conn-dot');
  const connText = document.getElementById('conn-text');

  ws.onopen = () => {
    connDot.className = 'conn-dot ok';
    connText.textContent = 'Conectado';
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);

    if (d.type === 'init') {
      // Initial state: array of live streamers
      if (d.streamers) {
        for (const s of d.streamers) {
          streamers.set(s.username, s);
          createOrUpdateMarker(s);
        }
        updateTopbar();
        if (d.streamers.length > 0) fitAllMarkers();
      }
      return;
    }

    if (d.type === 'location') {
      let s = streamers.get(d.username);
      if (!s) {
        s = { username: d.username, displayName: d.displayName, category: d.category, isLive: true, trail: [], viewerCount: 0 };
        streamers.set(d.username, s);
      }
      s.location = { lat: d.lat, lon: d.lon, accuracy: d.accuracy, speed: d.speed, heading: d.heading, updatedAt: d.updatedAt || Date.now() };
      s.isLive = true;
      s.viewerCount = d.viewerCount ?? s.viewerCount;
      s.displayName = d.displayName || s.displayName;
      s.category = d.category || s.category;

      if (!s.trail) s.trail = [];
      s.trail.push([d.lat, d.lon]);
      if (s.trail.length > 500) s.trail.shift();

      createOrUpdateMarker(s);
      updateTopbar();
      if (selectedUser === d.username) updateSelectedPanel();
      return;
    }

    if (d.type === 'streamer_online') {
      streamers.set(d.username, d);
      createOrUpdateMarker(d);
      updateTopbar();
      notify(`📡 ${d.displayName || d.username} ficou online!`);
      return;
    }

    if (d.type === 'offline') {
      const s = streamers.get(d.username);
      if (s) {
        s.isLive = false;
        // Keep marker but change visuals could be done here
        removeMarker(d.username);
        streamers.delete(d.username);
      }
      updateTopbar();
      if (selectedUser === d.username) closePanel();
      return;
    }

    if (d.type === 'safe_zone') {
      const s = streamers.get(d.username);
      if (s) {
        // Keep alive but don't update position
        if (selectedUser === d.username) {
          document.getElementById('p-updated').textContent = '🛡️ zona segura';
        }
      }
      return;
    }

    if (d.type === 'viewer_count') {
      const s = streamers.get(d.username);
      if (s) s.viewerCount = d.viewerCount;
      if (selectedUser === d.username) updateSelectedPanel();
      return;
    }
  };

  ws.onerror = () => {
    connDot.className = 'conn-dot err';
    connText.textContent = 'Erro';
  };

  ws.onclose = () => {
    connDot.className = 'conn-dot off';
    connText.textContent = 'Reconectando…';
    reconnectTimer = setTimeout(connect, 3000);
  };
}

// ═══════════ FALLBACK: fetch /api/live se WS não conectar ═══════════
async function fetchLiveFallback() {
  try {
    const r = await fetch(`${API}/api/live`);
    const data = await r.json();
    for (const s of data) {
      streamers.set(s.username, s);
      createOrUpdateMarker(s);
    }
    updateTopbar();
    if (data.length > 0 && markers.size === data.length) fitAllMarkers();
  } catch {}
}

// ═══════════ PERIODIC UPDATES ═══════════
updateInterval = setInterval(() => {
  // Update "X seconds ago" in panel
  if (selectedUser) updateSelectedPanel();
}, 5000);

// ═══════════ TOAST ═══════════
let toastTimer;
function notify(msg) {
  clearTimeout(toastTimer);
  document.getElementById('toast-text').textContent = msg;
  document.getElementById('toast').classList.add('show');
  toastTimer = setTimeout(() => document.getElementById('toast').classList.remove('show'), 4000);
}

// ═══════════ KEYBOARD ═══════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});

// ═══════════ START ═══════════
connect();
setTimeout(fetchLiveFallback, 2000); // Fallback in case WS init message was lost
</script>
